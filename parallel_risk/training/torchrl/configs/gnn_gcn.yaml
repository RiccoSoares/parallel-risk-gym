# GCN Training Configuration for Parallel Risk

env:
  map_name: "simple_6"
  max_turns: 50  # Reduced from 100 to force aggressive play
  action_budget: 5
  seed: null  # Set to integer for reproducibility
  use_reward_shaping: true  # Enable dense reward shaping (conquest, territory control, etc.)

model:
  type: "gcn"
  hidden_dim: 128
  num_layers: 3
  dropout: 0.1

training:
  num_workers: 4           # Parallel environments (not yet implemented)
  batch_size: 4096         # Environment steps per update (increased from 1024 for stability)
  num_epochs: 10           # SGD epochs per batch
  learning_rate: 1.0e-4    # Reduced from 3e-4 for more stable updates
  gamma: 0.99              # Discount factor
  gae_lambda: 0.95         # GAE lambda
  clip_epsilon: 0.2        # PPO clip parameter
  entropy_coeff: 0.01      # Entropy bonus (reverted from 0.05 to match successful Phase 1 RLlib config)
  value_loss_coeff: 0.5    # Value loss coefficient
  max_grad_norm: 0.5       # Gradient clipping
  use_gpu: false           # Use GPU if available

logging:
  log_dir: "runs/gnn_training"
  checkpoint_dir: "checkpoints/gnn_training"
  checkpoint_interval: 10  # Save every N iterations
