# PPO Baseline Configuration for Parallel Risk
# This is a starting point - tune these based on your results

# Environment settings
env:
  map_name: "simple_6"
  max_turns: 100
  action_budget: 5  # Fixed number of actions per turn
  reward_shaping: "sparse"  # Options: "sparse", "dense", "territorial", "aggressive"

# Training settings
training:
  num_workers: 4  # Parallel rollout workers
  num_envs_per_worker: 1
  num_gpus: 0  # Set to 1 if GPU available
  train_batch_size: 4000
  sgd_minibatch_size: 128
  num_sgd_iter: 10

# PPO hyperparameters
ppo:
  gamma: 0.99  # Discount factor
  lambda: 0.95  # GAE lambda
  clip_param: 0.2  # PPO clip parameter
  vf_clip_param: 10.0  # Value function clip
  entropy_coeff: 0.01  # Entropy bonus
  lr: 3.0e-4  # Learning rate
  lr_schedule: null  # null = constant, or list [[timestep, lr], ...]

# Network architecture
model:
  fcnet_hiddens: [256, 256]  # Hidden layer sizes
  fcnet_activation: "relu"  # Activation function
  vf_share_layers: false  # Separate networks for policy and value

# Self-play settings
self_play:
  enabled: true
  policy_pool_size: 5  # Keep last N policy versions
  win_rate_threshold: 0.7  # Add to pool if win rate > threshold
  policy_mapping_fn: "main_vs_pool"  # How to match opponents

# Checkpointing and logging
checkpoint:
  frequency: 10  # Save every N iterations
  keep: 5  # Keep last N checkpoints

logging:
  log_level: "INFO"
  tensorboard: true
  wandb: false  # Set to true if using Weights & Biases
  wandb_project: "parallel-risk"

# Stop conditions
stop:
  training_iteration: 1000
  timesteps_total: 5000000
  episode_reward_mean: 0.8  # Stop if reaching high win rate
